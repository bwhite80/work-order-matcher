<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Download — Work Order Matcher</title>
<style>
  :root {
    --bg: #eef0f1; --surface: #ffffff; --ink: #1a1e23; --muted: #5b6470;
    --line: #d7dbdf; --ok: #2f9e6b; --danger: #c94f4f;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #14171b; --surface: #1c2026; --ink: #eceff2; --muted: #929aa4; --line: #333941; --ok: #4dbf8a; --danger: #e07272; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    padding: 24px;
  }
  .card {
    max-width: 420px; width: 100%; background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 24px; text-align: center;
  }
  h1 { font-size: 18px; margin: 0 0 8px; }
  p { color: var(--muted); font-size: 14px; margin: 0 0 20px; line-height: 1.5; }
  a.download-btn {
    display: block; width: 100%; padding: 14px; background: var(--ok); color: #06231a;
    border-radius: 10px; font-weight: 700; font-size: 15px; text-decoration: none;
  }
  a.download-btn:active { transform: translateY(1px); }
  .error { color: var(--danger); font-size: 14px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <h1>Preparing your file…</h1>
    <p>This finishes the download that was started in Claude.</p>
  </div>

<script>
function base64ToBlob(base64, mime) {
  const binary = atob(base64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return new Blob([bytes], { type: mime });
}

(function () {
  const card = document.getElementById('card');
  const hash = location.hash.replace(/^#/, '');
  const params = new URLSearchParams(hash);
  const filename = params.get('f') || 'Matched_Work_Orders.xlsx';
  const data = params.get('d');

  if (!data) {
    card.innerHTML = '<h1>Nothing to download</h1><p class="error">No file data was passed in the link. Go back to the matcher and tap Download again.</p>';
    return;
  }

  try {
    const blob = base64ToBlob(decodeURIComponent(data), 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
    const url = URL.createObjectURL(blob);
    card.innerHTML = '<h1>Your file is ready</h1><p>Tap below to save it.</p>' +
      '<a class="download-btn" id="dl" download="' + filename.replace(/"/g, '&quot;') + '" href="' + url + '">Download ' + filename + '</a>';
  } catch (err) {
    card.innerHTML = '<h1>Something went wrong</h1><p class="error">' + err.message + '</p>';
  }
})();
</script>
</body>
</html>
